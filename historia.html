<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pingpong - Celá história zápasov</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="back-link-container" style="margin-top: 15px;">
    <a href="index.html" class="back-link">← Späť na Tabuľku</a>
  </div>
  
  <h1 style="text-align: center; margin-bottom: 20px;">História ligy</h1>

  <div class="filter-form">
    <select id="filter-player">
      <option value="all">Všetci hráči</option>
      </select>
    
    <input type="month" id="filter-month" title="Vyber mesiac a rok">
    
    <button class="btn-save" style="padding: 10px 15px;" onclick="applyFilters()">Filtrovať</button>
    <button class="btn-delete" style="padding: 10px 15px; background-color:#e1e8ed; color:#34495e; border:none;" onclick="resetFilters()">Zrušiť</button>
  </div>

  <div class="table-wrapper">
    <table id="history-table" class="main-table">
      <thead>
        <tr>
          <th>Dátum</th>
          <th>Zápas</th>
          <th>Skóre</th>
          <th>Akcia</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBvjsbk35S43nORNCHfg4AJfVAxp3rr_gg",
    authDomain: "ligapinec.firebaseapp.com",
    projectId: "ligapinec",
    storageBucket: "ligapinec.firebasestorage.app",
    messagingSenderId: "1005675095277",
    appId: "1:1005675095277:web:94ed61594ba1d088e1d8e4"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  
  const players = ["Alex", "Maxo", "Jašo", "Miňo", "Pali", "Kali", "Erik", "Pišta"];
  let allMatches = []; 

  window.onload = () => {
    const playerSelect = document.getElementById("filter-player");
    players.forEach(p => playerSelect.add(new Option(p, p)));

    db.collection("zapas").onSnapshot((snapshot) => {
      allMatches = [];
      snapshot.forEach((doc) => {
        allMatches.push({ key: doc.id, ...doc.data() });
      });
      
      allMatches.sort((a, b) => {
        let timeA = a.timestamp ? a.timestamp.toMillis() : 0;
        let timeB = b.timestamp ? b.timestamp.toMillis() : 0;
        let dateA = a.date ? new Date(a.date).getTime() : timeA;
        let dateB = b.date ? new Date(b.date).getTime() : timeB;
        if (dateA === dateB) return timeB - timeA; 
        return dateB - dateA;
      });

      renderHistoryTable(allMatches);
    });
  };

  function applyFilters() {
    const selectedPlayer = document.getElementById("filter-player").value;
    const selectedMonth = document.getElementById("filter-month").value; 
    
    let filteredMatches = allMatches.filter(match => {
      let matchPlayer = true;
      if (selectedPlayer !== "all") {
        matchPlayer = (match.player1 === selectedPlayer || match.player2 === selectedPlayer);
      }
      
      let matchDate = true;
      if (selectedMonth && match.date) {
        matchDate = match.date.substring(0, 7) === selectedMonth;
      } else if (selectedMonth && !match.date) {
        matchDate = false; 
      }

      return matchPlayer && matchDate;
    });

    renderHistoryTable(filteredMatches);
  }

  function resetFilters() {
    document.getElementById("filter-player").value = "all";
    document.getElementById("filter-month").value = "";
    renderHistoryTable(allMatches); 
  }

  function renderHistoryTable(matches) {
    const tbody = document.querySelector('#history-table tbody');
    tbody.innerHTML = '';
    
    // Potrebujeme vedieť koho hľadáme, aby sme ho mohli zvýrazniť
    const selectedPlayer = document.getElementById("filter-player").value;

    if (matches.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:#7f8c8d; padding: 20px; text-align:center;">Žiadne výsledky nenašli kritériám.</td></tr>';
      return;
    }

    matches.forEach(match => {
      const tr = document.createElement('tr');
      
      let winnerName, loserName, winnerScore, loserScore;
      if (match.score1 > match.score2) {
        winnerName = `<strong>${match.player1}</strong>`;
        loserName = match.player2;
        winnerScore = match.score1;
        loserScore = match.score2;
      } else {
        winnerName = `<strong>${match.player2}</strong>`;
        loserName = match.player1;
        winnerScore = match.score2;
        loserScore = match.score1;
      }

      // ZVÝRAZNENIE: Ak je zapnutý filter na hráča, jeho meno bude žlté
      if (selectedPlayer !== "all") {
        if (winnerName.includes(selectedPlayer)) {
           winnerName = `<span style="background-color: #ffeb3b; color: #000; padding: 2px 6px; border-radius: 4px;">${winnerName}</span>`;
        } else if (loserName.includes(selectedPlayer)) {
           loserName = `<span style="background-color: #ffeb3b; color: #000; padding: 2px 6px; border-radius: 4px;">${loserName}</span>`;
        }
      }

      let displayDate = match.date;
      if(match.date) {
        const parts = match.date.split('-');
        if(parts.length === 3) {
           displayDate = `${parts[2]}.${parts[1]}.${parts[0]}`;
        }
      }

      tr.innerHTML = `
        <td><span class="score-box" style="font-weight:bold; color:var(--text-muted); font-size: 0.9em;">${displayDate}</span></td>
        <td>${winnerName} vs ${loserName} <br><small style="color:#95a5a6;">Zápas #${match.matchNumber || match.key.split('_')[2]}</small></td>
        <td><span class="score-box" style="font-weight:bold; color: var(--success);">${winnerScore} : ${loserScore}</span></td>
        <td><button class="btn-delete" onclick="deleteMatch('${match.key}')">Zmazať</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function deleteMatch(key) {
    if (confirm("Naozaj chceš vymazať tento zápas z histórie?")) {
      try {
        await db.collection("zapas").doc(key).delete();
      } catch (error) {
        console.error("Chyba pri mazaní: ", error);
        alert("Zápas sa nepodarilo vymazať.");
      }
    }
  }
</script>
</body>
</html>
